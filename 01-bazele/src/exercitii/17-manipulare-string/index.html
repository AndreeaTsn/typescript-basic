      <h1>17 - Lungime si majuscule / minuscule</h1>

      <div class="descriere">
        <strong>Ce inveti:</strong> proprietatile si metodele de baza pe
        <code>string</code>:
        <ul>
          <li><code>.length</code> - cate caractere are</li>
          <li><code>.toUpperCase()</code> - face majuscule</li>
          <li><code>.toLowerCase()</code> - face minuscule</li>
        </ul>
        Aceste lucruri sunt foarte utile in testare.
      </div>

      <div id="lungime" class="rezultat"></div>
      <div id="majuscule" class="rezultat"></div>
      <div id="minuscule" class="rezultat"></div>
    </main>
