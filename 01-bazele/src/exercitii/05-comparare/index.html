<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <title>05 - Comparare</title>
    <link rel="stylesheet" href="../../style.css" />

  <body>
    <main>
      <a href="../../index.html" class="inapoi">&larr; Inapoi la meniu</a>
      <h1>05 - Operatori de comparare</h1>

      <div class="descriere">
        <strong>Ce inveti:</strong> tipul <code>boolean</code> (doar
        <code>true</code> sau <code>false</code>) si operatorii de comparare:
        <code>===</code> egal, <code>!==</code> diferit, <code>&gt;</code>
        mai mare, <code>&lt;</code> mai mic, <code>&gt;=</code> mai mare sau
        egal, <code>&lt;=</code> mai mic sau egal.
      </div>

      <p>Fiecare comparare returneaza fie <code>true</code>, fie
        <code>false</code>.</p>

      <div id="egal" class="rezultat"></div>
      <div id="diferit" class="rezultat"></div>
      <div id="maiMare" class="rezultat"></div>
      <div id="maiMic" class="rezultat"></div>
      <div id="maiMareSauEgal" class="rezultat"></div>
      <div id="maiMicSauEgal" class="rezultat"></div>
    </main>
    <script type="module" src="./script.ts"></script>
  </body>
</html>
