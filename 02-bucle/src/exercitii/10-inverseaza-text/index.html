  <body>
    <main>
      <a href="../../index.html" class="inapoi">&larr; Inapoi la meniu</a>
      <h1>10 - Inverseaza un text</h1>

      <div class="descriere">
        <strong>Ce inveti:</strong> truc clasic - parcurgi textul si concatenezi
        fiecare caracter <strong>la inceputul</strong> rezultatului, nu la
        sfarsit.
      </div>

      <p>Pentru un text dat (ex: <em>"Salut"</em>), construieste varianta lui
        inversata (<em>"tulaS"</em>). Afiseaza un text de forma
        <em>"Salut -&gt; tulaS"</em>.</p>

      <div id="rezultat" class="rezultat"></div>
    </main>

  </body>
